<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>合勝大佃 - 萊爾富雲端系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #E5E7EB; color: #1E293B; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .nav-onyx { background: linear-gradient(135deg, #18181B 0%, #27272A 100%); }
        .gold-line { height: 3px; background: linear-gradient(90deg, #D4AF37, #F59E0B); }
        .sticky-header { flex-shrink: 0; z-index: 50; }
        .scanner-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0, 0, 0, 0.1); }
        .scrollable-content { flex-grow: 1; overflow-y: auto; padding-bottom: 80px; }
        .morandi-pink { background-color: #FFF1F2 !important; color: #9F1239; }
        .barcode-svg { width: 100%; height: 110px; }
        .btn-onyx { background: #18181B; color: #F59E0B; border: 1px solid #3F3F46; transition: all 0.3s; }
        .btn-onyx:disabled { opacity: 0.5; cursor: not-allowed; }
        .progress-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: center; justify-content: center; color: white; }
    </style>
</head>
<body>

    <div id="progress-overlay" class="progress-overlay flex-col">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-amber-500 mb-6"></div>
        <p id="progress-text" class="text-xl font-bold tracking-widest">正在生成極速 PDF...</p>
        <p class="text-zinc-500 mt-2 text-sm">採用直接繪製引擎</p>
    </div>

    <header class="sticky-header">
        <nav class="nav-onyx text-white">
            <div class="max-w-6xl mx-auto px-6 py-3 flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <div class="w-1.5 h-8 bg-amber-500 rounded-full"></div>
                    <div>
                        <h1 class="text-lg font-bold tracking-tighter italic leading-none">HI-LIFE <span class="text-amber-500">CLOUD</span></h1>
                        <p class="text-[8px] text-zinc-500 tracking-[0.3em] font-medium uppercase mt-1">合勝大佃 | 萊爾富專屬系統</p>
                    </div>
                </div>
                <div id="item-count" class="bg-zinc-800/50 border border-zinc-700 px-4 py-1 rounded-lg text-center">
                    <span class="text-[9px] text-zinc-500 font-bold block leading-none mb-1 uppercase text-right">Count</span>
                    <span class="text-xl font-mono text-amber-500 leading-none">0</span>
                </div>
            </div>
            <div class="gold-line"></div>
        </nav>

        <div class="scanner-card">
            <div class="max-w-6xl mx-auto p-4 md:p-6">
                <div class="flex flex-col lg:flex-row gap-4 items-center">
                    <div class="flex-1 w-full relative">
                        <input type="text" id="barcode-input" autofocus
                               class="w-full pl-6 pr-14 py-4 bg-zinc-50 border border-zinc-200 rounded-xl focus:ring-8 focus:ring-amber-500/5 focus:border-zinc-400 outline-none transition-all text-2xl font-mono tracking-tighter shadow-inner placeholder:text-zinc-300"
                               placeholder="scan barcode">
                    </div>
                    <div class="flex gap-2 w-full lg:w-auto">
                        <button id="pdf-btn" onclick="exportToPDF()" class="btn-onyx px-8 py-4 rounded-xl font-bold flex-1 lg:flex-none shadow-lg">匯出 PDF</button>
                        <button onclick="clearAll()" class="bg-white border border-zinc-200 text-zinc-400 hover:text-red-500 px-4 py-4 rounded-xl transition-all shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>
                </div>
                <div id="status-msg" class="mt-3 flex items-center space-x-3">
                    <span id="status-dot" class="w-2.5 h-2.5 bg-zinc-300 rounded-full"></span>
                    <p id="status-text" class="text-[10px] font-bold tracking-widest text-zinc-400 uppercase">System Ready</p>
                </div>
            </div>
        </div>
    </header>

    <main class="scrollable-content p-4 md:p-6">
        <div class="max-w-6xl mx-auto bg-white rounded-[2rem] shadow-xl border border-white overflow-hidden">
            <table id="barcode-table" class="w-full border-collapse">
                <thead class="bg-zinc-50 sticky top-0 z-10 border-b border-zinc-100">
                    <tr class="text-zinc-400 text-[10px] uppercase tracking-[0.2em]">
                        <th class="py-4 px-4 font-bold w-20 text-center border-r">No.</th>
                        <th class="py-4 px-4 font-bold text-left">Details</th>
                        <th class="py-4 px-4 font-bold text-center w-80">Barcode</th>
                        <th class="py-4 px-4 font-bold text-right">Time Log</th>
                        <th class="py-4 px-4 font-bold text-center w-16 no-print"></th>
                    </tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-zinc-50"></tbody>
            </table>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://cyzjgvdhthrzkfciaqcl.supabase.co";
        const SUPABASE_KEY = "sb_publishable_GErSlEWWvuOdUU0AN_r3yQ_OjTAyHwZ";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let scannedItems = [];
        let tempBarcode1 = null;

        const inputEl = document.getElementById('barcode-input');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const tableBody = document.getElementById('table-body');
        const countValue = document.querySelector('#item-count span:last-child');
        const pdfBtn = document.getElementById('pdf-btn');

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
       function playSound(t) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
    
            o.connect(g);
            g.connect(audioCtx.destination);

            if (t === 'success') {
                // 成功音：清脆的高音 (C6 琴音)
                o.type = 'sine';
                o.frequency.setValueAtTime(1046.50, audioCtx.currentTime); 
                g.gain.setValueAtTime(0.4, audioCtx.currentTime); // 音量提高到 40%
                o.start();
                // 快速衰減，聽起來像短促的「叮」
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                o.stop(audioCtx.currentTime + 0.2);
            } else {
                // 錯誤音：更有感的警示聲 (鋸齒波)
                o.type = 'sawtooth'; 
                o.frequency.setValueAtTime(220, audioCtx.currentTime); 
                g.gain.setValueAtTime(0.6, audioCtx.currentTime); // 音量提高到 60%
                o.start();
                // 較長的衰減，聽起來像警告
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                o.stop(audioCtx.currentTime + 0.5);
            }
        }

        window.onload = async () => {
            await refreshData();
            inputEl.focus();
            _supabase.channel('sync').on('postgres_changes', { event: '*', schema: 'public', table: 'scans' }, (p) => {
                if (p.eventType === 'INSERT' && !scannedItems.some(i => i.b2 === p.new.b2)) refreshData();
                else if (p.eventType === 'DELETE') refreshData();
            }).subscribe();
        };

        async function refreshData() {
            const { data, error } = await _supabase.from('scans').select('*').order('id', { ascending: true });
            if (!error) { scannedItems = data; renderFullTable(); }
        }

        async function processBarcode(code) {
            if (!tempBarcode1) {
                if (code.length !== 9) { playSound('error'); return; }
                tempBarcode1 = code;
                statusText.innerText = "WAITING FOR B2...";
                statusDot.className = "w-2.5 h-2.5 bg-blue-500 rounded-full animate-pulse";
            } else {
                if (code.length !== 16 || scannedItems.some(i => i.b2 === code)) { playSound('error'); tempBarcode1 = null; return; }
                playSound('success');
                const ts = new Date().toLocaleString('en-GB');
                const newItem = { b1: tempBarcode1, b2: code, time: ts };
                scannedItems.push(newItem);
                addSingleRowToUI(newItem, scannedItems.length);
                _supabase.from('scans').insert([newItem]).then(({error}) => { if(error) console.error(error); });
                tempBarcode1 = null;
                statusText.innerText = "SAVED.";
                statusDot.className = "w-2.5 h-2.5 bg-emerald-500 rounded-full";
            }
        }

        function addSingleRowToUI(item, index) {
            const r1 = document.createElement('tr');
            r1.className = "border-b";
            r1.innerHTML = `<td rowspan="2" class="p-6 text-center font-bold text-zinc-200 text-4xl border-r">${index}</td>
                            <td class="p-5 morandi-pink font-mono font-bold border-l-[10px] border-rose-200 text-sm shadow-inner">${item.b1}</td>
                            <td class="p-2 bg-white text-center"><svg id="b1-v-${index}" class="barcode-svg"></svg></td>
                            <td rowspan="2" class="p-5 text-right font-mono text-[9px] text-zinc-400">${item.time}</td>
                            <td rowspan="2" class="p-5 text-center no-print"><button onclick="deleteItemByB2('${item.b2}')" class="text-zinc-300 hover:text-red-500">❌</button></td>`;
            const r2 = document.createElement('tr');
            r2.className = "border-b";
            r2.innerHTML = `<td class="p-5 bg-zinc-50 font-mono font-bold text-sm border-l-[10px] border-zinc-100 shadow-inner">${item.b2}</td>
                            <td class="p-2 bg-white text-center"><svg id="b2-v-${index}" class="barcode-svg"></svg></td>`;
            tableBody.prepend(r2); tableBody.prepend(r1);
            JsBarcode(`#b1-v-${index}`, item.b1, { format: "CODE39", height: 100, width: 1.2, displayValue: false });
            JsBarcode(`#b2-v-${index}`, item.b2, { format: "CODE39", height: 100, width: 1.2, displayValue: false });
            countValue.innerText = scannedItems.length;
        }

        function renderFullTable() {
            tableBody.innerHTML = '';
            [...scannedItems].reverse().forEach((item, index) => {
                const idx = scannedItems.length - index;
                const row = `<tr class="border-b"><td rowspan="2" class="p-6 text-center font-bold text-zinc-200 text-4xl border-r">${idx}</td>
                    <td class="p-5 morandi-pink font-mono font-bold border-l-[10px] border-rose-200 text-sm">${item.b1}</td>
                    <td class="p-2 bg-white"><svg id="b1-f-${idx}" class="barcode-svg"></svg></td>
                    <td rowspan="2" class="p-5 text-right font-mono text-[9px] text-zinc-400">${item.time}</td>
                    <td rowspan="2" class="p-5 text-center no-print"><button onclick="deleteItemByB2('${item.b2}')">❌</button></td></tr>
                    <tr class="border-b"><td class="p-5 bg-zinc-50 font-mono font-bold text-sm border-l-[10px] border-zinc-100">${item.b2}</td>
                    <td class="p-2 bg-white"><svg id="b2-f-${idx}" class="barcode-svg"></svg></td></tr>`;
                tableBody.insertAdjacentHTML('beforeend', row);
                JsBarcode(`#b1-f-${idx}`, item.b1, { format: "CODE39", height: 100, width: 1.2, displayValue: false });
                JsBarcode(`#b2-f-${idx}`, item.b2, { format: "CODE39", height: 100, width: 1.2, displayValue: false });
            });
            countValue.innerText = scannedItems.length;
        }

        // --- 🚀 極速 PDF 繪出引擎 (每頁 5 筆) ---
        async function exportToPDF() {
            if (scannedItems.length === 0) return;
            const overlay = document.getElementById('progress-overlay');
            const progressText = document.getElementById('progress-text');
            overlay.style.display = 'flex';
            pdfBtn.disabled = true;

            const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
            const itemsPerPage = 5;
            const totalItems = scannedItems.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            
            // 使用一個隱藏的 Canvas 來轉換條碼
            const offCanvas = document.createElement('canvas');

            for (let i = 0; i < totalItems; i++) {
                const pageIdx = Math.floor(i / itemsPerPage);
                const itemIdx = i % itemsPerPage;

                // 換頁處理
                if (i > 0 && itemIdx === 0) {
                    pdf.addPage();
                }

                progressText.innerText = `正在寫入: ${i + 1} / ${totalItems}`;

                const item = scannedItems[i];
                const yBase = 15 + (itemIdx * 55); // A4 高度分佈

                // 1. 繪製背景與外框 (模擬原本的外觀)
                pdf.setDrawColor(240, 240, 240);
                pdf.rect(10, yBase, 190, 50); 
                
                // 2. 寫入編號 (No.)
                pdf.setFontSize(35);
                pdf.setTextColor(230, 230, 230);
                pdf.setFont("helvetica", "bold");
                pdf.text(`${i + 1}`, 15, yBase + 32);

                // 3. 處理 B1 (粉紅區塊條碼)
                pdf.setFillColor(255, 241, 242); // Morandi Pink
                pdf.rect(35, yBase + 2, 70, 22, 'F');
                
                JsBarcode(offCanvas, item.b1, { format: "CODE39", height: 60, width: 2, displayValue: false, margin: 0 });
                pdf.addImage(offCanvas.toDataURL('image/jpeg', 0.8), 'JPEG', 110, yBase + 2, 60, 22);
                
                pdf.setFontSize(14);
                pdf.setTextColor(159, 12, 57);
                pdf.text(item.b1, 40, yBase + 16);

                // 4. 處理 B2 (白色區塊條碼)
                JsBarcode(offCanvas, item.b2, { format: "CODE39", height: 60, width: 2, displayValue: false, margin: 0 });
                pdf.addImage(offCanvas.toDataURL('image/jpeg', 0.8), 'JPEG', 110, yBase + 26, 60, 22);
                
                pdf.setFontSize(14);
                pdf.setTextColor(30, 41, 59);
                pdf.text(item.b2, 40, yBase + 40);

                // 5. 寫入時間與頁碼資訊
                pdf.setFontSize(7);
                pdf.setTextColor(180, 180, 180);
                pdf.text(item.time, 195, yBase + 47, { align: 'right' });
                
                if (itemIdx === 4 || i === totalItems - 1) {
                   pdf.setFontSize(8);
                   pdf.text(`Page ${pageIdx + 1} / ${totalPages}`, 105, 290, { align: 'center' });
                }
            }

            const now = new Date();
            const dateStr = `${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
            pdf.save(`${dateStr}HI-LIFE${totalItems}pcs.pdf`);
            
            overlay.style.display = 'none';
            pdfBtn.disabled = false;
            pdfBtn.innerText = "匯出 PDF";
        }

        async function deleteItemByB2(b2) { if(confirm('DELETE?')) { await _supabase.from('scans').delete().eq('b2', b2); scannedItems = scannedItems.filter(i => i.b2 !== b2); renderFullTable(); } }
        async function clearAll() { if(confirm('CLEAR ALL?')) { await _supabase.from('scans').delete().neq('id', 0); scannedItems = []; renderFullTable(); } }
        inputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') { const v = inputEl.value.trim().toUpperCase(); if (v) processBarcode(v); inputEl.value = ''; } });
        document.addEventListener('click', () => { inputEl.focus(); });
    </script>
</body>
</html>
