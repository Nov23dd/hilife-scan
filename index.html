<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合勝大佃II - 萊爾富雲端系統</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .morandi-pink { background-color: #fff1f2 !important; color: #9f1239; }
        .barcode-svg { width: 100%; max-height: 50px; }
        /* 隱藏捲軸但保持滾動 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .btn-metal { background: linear-gradient(180deg, #475569 0%, #1e293b 100%); transition: all 0.2s; }
        .btn-metal:active { transform: translateY(1px); filter: brightness(1.1); }
    </style>
</head>
<body class="text-slate-900">

    <nav class="bg-slate-900 text-slate-100 p-5 shadow-2xl sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-3 h-8 bg-red-500 rounded-full"></div>
                <h1 class="text-lg font-bold tracking-tight">萊爾富雲端刷單 <span class="text-slate-400 font-light">| 合勝大佃II</span></h1>
            </div>
            <div id="item-count" class="bg-slate-800 border border-slate-700 px-4 py-1 rounded-lg font-mono text-sm">
                ITEMS: <span class="text-emerald-400">0</span>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 md:p-8 space-y-6">
        <div class="glass-card rounded-2xl p-6 shadow-sm border border-slate-200">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1 relative">
                    <input type="text" id="barcode-input" autofocus
                           class="w-full pl-4 pr-12 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-slate-200 focus:border-slate-400 outline-none transition-all text-xl font-mono"
                           placeholder="等待掃描條碼...">
                    <div class="absolute right-4 top-4 text-slate-300">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                        </svg>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="exportToPDF()" class="btn-metal text-white px-8 py-4 rounded-xl font-bold flex-1 md:flex-none">匯出報表</button>
                    <button onclick="clearAll()" class="bg-white border border-slate-200 text-slate-400 hover:text-red-500 px-4 py-4 rounded-xl transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                </div>
            </div>
            <div id="status-msg" class="mt-4 text-sm font-medium text-slate-400 flex items-center">
                <span class="w-2 h-2 bg-slate-300 rounded-full animate-pulse mr-2"></span>
                準備就緒
            </div>
        </div>

        <div class="glass-card rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto no-scrollbar">
                <table id="barcode-table" class="w-full border-collapse">
                    <thead class="bg-slate-50/50">
                        <tr class="text-slate-400 text-xs uppercase tracking-widest border-b border-slate-100">
                            <th class="p-4 font-semibold w-16 text-center">No.</th>
                            <th class="p-4 font-semibold text-left">條碼明細 (Code 39)</th>
                            <th class="p-4 font-semibold text-center w-64">可讀取條碼</th>
                            <th class="p-4 font-semibold text-right">時間戳記</th>
                            <th class="p-4 font-semibold text-center w-16"></th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const { jsPDF } = window.jspdf;
        let scannedItems = [];
        let tempBarcode1 = null;

        const inputEl = document.getElementById('barcode-input');
        const statusEl = document.getElementById('status-msg');
        const tableBody = document.getElementById('table-body');
        const countEl = document.getElementById('item-count').querySelector('span');

        window.onload = () => {
            const saved = localStorage.getItem('hiLife_Pro_V3');
            if (saved) { scannedItems = JSON.parse(saved); renderTable(); }
            inputEl.focus();
        };

        document.addEventListener('click', () => inputEl.focus());

        inputEl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = inputEl.value.trim().toUpperCase();
                if (val) processBarcode(val);
                inputEl.value = '';
            }
        });

        function processBarcode(code) {
            if (!tempBarcode1) {
                tempBarcode1 = code;
                statusEl.innerHTML = `<span class="w-2 h-2 bg-blue-500 rounded-full mr-2"></span> 等待第二段條碼...`;
                statusEl.className = "mt-4 text-sm font-medium text-blue-600 flex items-center";
            } else {
                if (scannedItems.some(item => item.b2 === code)) {
                    statusEl.innerHTML = `<span class="w-2 h-2 bg-red-500 rounded-full mr-2"></span> 警告：重複過刷！`;
                    statusEl.className = "mt-4 text-sm font-medium text-red-600 flex items-center";
                    tempBarcode1 = null;
                    return;
                }
                const now = new Date();
                const ts = `${String(now.getDate()).padStart(2,'0')}-${String(now.getMonth()+1).padStart(2,'0')}-${now.getFullYear()}, ${now.toLocaleTimeString('en-GB')}`;
                scannedItems.unshift({ b1: tempBarcode1, b2: code, time: ts });
                renderTable();
                tempBarcode1 = null;
                statusEl.innerHTML = `<span class="w-2 h-2 bg-emerald-500 rounded-full mr-2"></span> 掃描完成`;
                statusEl.className = "mt-4 text-sm font-medium text-emerald-600 flex items-center";
            }
        }

        function renderTable() {
            tableBody.innerHTML = '';
            scannedItems.forEach((item, index) => {
                const realIndex = scannedItems.length - index;
                const row = `
                    <tr class="hover:bg-slate-50/50 transition-colors">
                        <td rowspan="2" class="p-4 text-center font-bold text-slate-300 text-2xl">${realIndex}</td>
                        <td class="p-3 morandi-pink font-mono font-bold border-l-4 border-rose-200 text-sm">${item.b1}</td>
                        <td class="p-2 bg-white"><svg id="b1-${index}" class="barcode-svg"></svg></td>
                        <td rowspan="2" class="p-4 text-right font-mono text-[10px] text-slate-400 leading-tight">${item.time}</td>
                        <td rowspan="2" class="p-4 text-center">
                            <button onclick="deleteItem(${index})" class="text-slate-300 hover:text-red-400 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
                            </button>
                        </td>
                    </tr>
                    <tr class="hover:bg-slate-50/50 transition-colors">
                        <td class="p-3 bg-white font-mono font-bold text-sm border-l-4 border-slate-100">${item.b2}</td>
                        <td class="p-2 bg-white"><svg id="b2-${index}" class="barcode-svg"></svg></td>
                    </tr>
                `;
                tableBody.insertAdjacentHTML('beforeend', row);
                const opts = { format: "CODE39", height: 40, displayValue: false, margin: 10 };
                JsBarcode(`#b1-${index}`, item.b1, opts);
                JsBarcode(`#b2-${index}`, item.b2, opts);
            });
            countEl.innerText = scannedItems.length;
            localStorage.setItem('hiLife_Pro_V3', JSON.stringify(scannedItems));
        }

        function deleteItem(index) {
            scannedItems.splice(index, 1);
            renderTable();
        }

        function clearAll() {
            if(confirm('確定清空所有紀錄？')) {
                scannedItems = [];
                localStorage.removeItem('hiLife_Pro_V3');
                renderTable();
            }
        }

        async function exportToPDF() {
            if (scannedItems.length === 0) return;
            const table = document.getElementById('barcode-table');
            const canvas = await html2canvas(table, { scale: 2 });
            const imgData = canvas.toDataURL('image/png');
            const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
            pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
            const now = new Date();
            const dateStr = `${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
            pdf.save(`${dateStr} 合勝大佃II萊爾富 ${scannedItems.length}.pdf`);
        }
    </script>
</body>
</html>
