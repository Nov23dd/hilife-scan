<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萊爾富雲端刷單系統 - 合勝大佃II</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .metallic-bg { background: linear-gradient(145deg, #e6e6e6, #ffffff); box-shadow: 5px 5px 10px #d1d1d1; }
        .pink-label { background-color: #ffd1dc !important; }
        .barcode-font { font-family: monospace; font-size: 18px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 font-sans">

    <div class="max-w-4xl mx-auto bg-slate-800 text-white p-4 rounded-t-lg shadow-lg flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-wider">萊爾富雲端刷單系統 (合勝大佃II)</h1>
        <div id="item-count" class="bg-yellow-500 text-slate-900 px-3 py-1 rounded-full font-bold">總件數: 0</div>
    </div>

    <div class="max-w-4xl mx-auto bg-white p-6 shadow-md mb-4 metallic-bg">
        <div class="flex flex-col md:flex-row gap-4">
            <input type="text" id="barcode-input" placeholder="請在此處掃描條碼..." 
                   class="flex-1 p-3 border-2 border-slate-300 rounded focus:border-blue-500 outline-none text-lg">
            <button onclick="clearAll()" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded font-bold transition">🗑️ 全部清空</button>
            <button onclick="exportToPDF()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded font-bold transition">📄 匯出 PDF</button>
        </div>
        <p id="status-msg" class="mt-2 text-gray-600 font-medium italic">等待掃描第一段條碼...</p>
    </div>

    <div class="max-w-4xl mx-auto bg-white shadow-xl overflow-hidden rounded-b-lg">
        <table id="barcode-table" class="w-full text-left border-collapse bg-white">
            <thead>
                <tr class="bg-slate-200 text-slate-700 border-b text-sm">
                    <th class="p-3 border w-16">件數</th>
                    <th class="p-3 border">條碼資料 (Code 39)</th>
                    <th class="p-3 border">一維條碼顯示</th>
                    <th class="p-3 border">掃描時間</th>
                    <th class="p-3 border no-print w-16">操作</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        let scannedItems = [];
        let tempBarcode1 = null;

        const inputEl = document.getElementById('barcode-input');
        const statusEl = document.getElementById('status-msg');
        const tableBody = document.getElementById('table-body');
        const countEl = document.getElementById('item-count');

        // 初始化：從 LocalStorage 讀取資料
        window.onload = () => {
            const savedData = localStorage.getItem('hiLife_Backup_V2');
            if (savedData) {
                scannedItems = JSON.parse(savedData);
                renderTable();
                statusEl.innerText = "已恢復紀錄，請繼續掃描...";
            }
            inputEl.focus();
        };

        document.addEventListener('click', () => inputEl.focus());

        inputEl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = inputEl.value.trim().toUpperCase(); // 同步 VBA 的 UCase
                if (val) processBarcode(val);
                inputEl.value = '';
            }
        });

        function processBarcode(code) {
            if (!tempBarcode1) {
                tempBarcode1 = code;
                statusEl.innerText = `✅ 第一段已讀取: ${code}，等待第二段...`;
                statusEl.style.color = "blue";
            } else {
                // 重複檢查 (用第二段條碼判斷)
                if (scannedItems.some(item => item.b2 === code)) {
                    alert(`⚠️ 警告：重複過刷！\n條碼 ${code} 已存在。`);
                    tempBarcode1 = null;
                    statusEl.innerText = "❌ 重複過刷，請重新掃描新包裹。";
                    statusEl.style.color = "red";
                    return;
                }

                const now = new Date();
                // 同步 VBA 時間格式: dd-mm-yyyy, hh:mm:ss
                const day = String(now.getDate()).padStart(2, '0');
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const year = now.getFullYear();
                const time = now.toLocaleTimeString('en-GB', { hour12: false });
                const timestamp = `${day}-${month}-${year}, ${time}`;

                scannedItems.push({ id: scannedItems.length + 1, b1: tempBarcode1, b2: code, time: timestamp });
                renderTable();
                tempBarcode1 = null;
                statusEl.innerText = "✅ 掃描成功！";
                statusEl.style.color = "green";
            }
        }

        function renderTable() {
            tableBody.innerHTML = '';
            scannedItems.forEach((item, index) => {
                const row = `
                    <tr class="border-b">
                        <td rowspan="2" class="p-3 border text-center font-bold text-xl">${index + 1}</td>
                        <td class="p-2 border pink-label barcode-font font-bold text-red-600">${item.b1}</td>
                        <td class="p-1 border text-center bg-white"><svg id="b1-${index}"></svg></td>
                        <td rowspan="2" class="p-2 border text-xs font-mono">${item.time}</td>
                        <td rowspan="2" class="p-2 border text-center no-print">
                            <button onclick="deleteItem(${index})" class="text-red-500">❌</button>
                        </td>
                    </tr>
                    <tr class="border-b">
                        <td class="p-2 border barcode-font font-bold">${item.b2}</td>
                        <td class="p-1 border text-center bg-white"><svg id="b2-${index}"></svg></td>
                    </tr>
                `;
                tableBody.insertAdjacentHTML('beforeend', row);
                
                // 使用 CODE39 格式，並同步 VBA 邏輯自動處理 * 字元
                const barcodeOptions = { format: "CODE39", height: 35, displayValue: true, fontSize: 14 };
                JsBarcode(`#b1-${index}`, item.b1, barcodeOptions);
                JsBarcode(`#b2-${index}`, item.b2, barcodeOptions);
            });
            countEl.innerText = `總件數: ${scannedItems.length}`;
            localStorage.setItem('hiLife_Backup_V2', JSON.stringify(scannedItems));
        }

        function deleteItem(index) {
            if(confirm('刪除此筆資料？')) {
                scannedItems.splice(index, 1);
                renderTable();
            }
        }

        function clearAll() {
            if(confirm('確定要清空並開始新批次嗎？')) {
                scannedItems = [];
                localStorage.removeItem('hiLife_Backup_V2');
                renderTable();
            }
        }

        async function exportToPDF() {
            if (scannedItems.length === 0) return;
            const table = document.getElementById('barcode-table');
            const canvas = await html2canvas(table, { scale: 2 });
            const imgData = canvas.toDataURL('image/png');
            const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
            pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
            
            const now = new Date();
            const dateStr = `${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
            pdf.save(`${dateStr} 合勝大佃II萊爾富 ${scannedItems.length}.pdf`);
        }
    </script>
</body>
</html>
