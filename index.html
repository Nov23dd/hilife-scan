<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>合勝大佃 - 萊爾富極速雲端系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #E5E7EB; color: #1E293B; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .nav-onyx { background: linear-gradient(135deg, #18181B 0%, #27272A 100%); }
        .gold-line { height: 3px; background: linear-gradient(90deg, #D4AF37, #F59E0B); }
        .sticky-header { flex-shrink: 0; z-index: 50; }
        .scanner-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0, 0, 0, 0.1); }
        .scrollable-content { flex-grow: 1; overflow-y: auto; padding-bottom: 80px; }
        .morandi-pink { background-color: #FFF1F2 !important; color: #9F1239; }
        .barcode-svg { width: 100%; height: 110px; }
        .btn-onyx { background: #18181B; color: #F59E0B; border: 1px solid #3F3F46; transition: all 0.3s; }
        .btn-onyx:disabled { opacity: 0.5; cursor: not-allowed; }
        #barcode-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; flex-direction: column; }
        #modal-svg { background: white; padding: 20px; border-radius: 12px; width: 90%; max-height: 300px; }
    </style>
</head>
<body>

    <div id="barcode-modal" onclick="this.style.display='none'">
        <p class="text-white mb-4 font-bold uppercase">Tap to close</p>
        <svg id="modal-svg"></svg>
    </div>

    <header class="sticky-header">
        <nav class="nav-onyx text-white">
            <div class="max-w-6xl mx-auto px-6 py-3 flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <div class="w-1 h-8 bg-amber-500 rounded-full"></div>
                    <div>
                        <h1 class="text-lg font-bold tracking-tighter italic leading-none">HI-LIFE <span class="text-amber-500">CLOUD</span></h1>
                        <p class="text-[8px] text-zinc-500 tracking-[0.3em] font-medium uppercase mt-1">合勝大佃 | 萊爾富專屬系統</p>
                    </div>
                </div>
                <div id="item-count" class="bg-zinc-800/50 border border-zinc-700 px-4 py-1 rounded-lg text-center">
                    <span class="text-[9px] text-zinc-500 font-bold block leading-none mb-1 uppercase text-right">Count</span>
                    <span class="text-xl font-mono text-amber-500 leading-none">0</span>
                </div>
            </div>
            <div class="gold-line"></div>
        </nav>

        <div class="scanner-card">
            <div class="max-w-6xl mx-auto p-4 md:p-6">
                <div class="flex flex-col lg:flex-row gap-4 items-center">
                    <div class="flex-1 w-full relative">
                        <input type="text" id="barcode-input" autofocus
                               class="w-full pl-6 pr-14 py-4 bg-zinc-50 border border-zinc-200 rounded-xl focus:ring-8 focus:ring-amber-500/5 focus:border-zinc-400 outline-none transition-all text-2xl font-mono tracking-tighter shadow-inner placeholder:text-zinc-300"
                               placeholder="掃描條碼">
                    </div>
                    <div class="flex gap-2 w-full lg:w-auto">
                        <button id="pdf-btn" onclick="exportToPDF()" class="btn-onyx px-8 py-4 rounded-xl font-bold flex-1 lg:flex-none shadow-lg">匯出 PDF</button>
                        <button onclick="clearAll()" class="bg-white border border-zinc-200 text-zinc-400 hover:text-red-500 px-4 py-4 rounded-xl transition-all shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>
                </div>
                <div id="status-msg" class="mt-3 flex items-center space-x-3">
                    <span id="status-dot" class="w-2.5 h-2.5 bg-zinc-300 rounded-full"></span>
                    <p id="status-text" class="text-[10px] font-bold tracking-widest text-zinc-400 uppercase">System Ready</p>
                </div>
            </div>
        </div>
    </header>

    <main class="scrollable-content p-4 md:p-6">
        <div class="max-w-6xl mx-auto bg-white rounded-[2rem] shadow-xl border border-white overflow-hidden">
            <table id="barcode-table" class="w-full border-collapse">
                <thead class="bg-zinc-50 sticky top-0 z-10 border-b border-zinc-100">
                    <tr class="text-zinc-400 text-[10px] uppercase tracking-[0.2em]">
                        <th class="py-4 px-4 font-bold w-20 text-center border-r">No.</th>
                        <th class="py-4 px-4 font-bold text-left">Details</th>
                        <th class="py-4 px-4 font-bold text-center w-80">Barcode</th>
                        <th class="py-4 px-4 font-bold text-right">Time Log</th>
                        <th class="py-4 px-4 font-bold text-center w-16 no-print"></th>
                    </tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-zinc-50"></tbody>
            </table>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://cyzjgvdhthrzkfciaqcl.supabase.co";
        const SUPABASE_KEY = "sb_publishable_GErSlEWWvuOdUU0AN_r3yQ_OjTAyHwZ";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let scannedItems = [];
        let tempBarcode1 = null;

        const inputEl = document.getElementById('barcode-input');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const tableBody = document.getElementById('table-body');
        const countValue = document.querySelector('#item-count span:last-child');
        const pdfBtn = document.getElementById('pdf-btn');

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(t){
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);
            if(t==='success'){o.type='sine';o.frequency.setValueAtTime(880,audioCtx.currentTime);g.gain.setValueAtTime(0.05,audioCtx.currentTime);o.start();g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.15);o.stop(audioCtx.currentTime+0.15)}
            else{o.type='sawtooth';o.frequency.setValueAtTime(150,audioCtx.currentTime);g.gain.setValueAtTime(0.1,audioCtx.currentTime);o.start();g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.4);o.stop(audioCtx.currentTime+0.4)}
        }

        window.onload = async () => {
            await refreshData();
            inputEl.focus();
            // 監聽雲端變動，但只在「外部」裝置變動時觸發刷新，避免自己掃描也觸發全表刷新
            _supabase.channel('custom-all-channel').on('postgres_changes', { event: '*', schema: 'public', table: 'scans' }, (payload) => {
                if (payload.eventType === 'INSERT') {
                    // 如果這筆不是本機剛新增的，才需要刷新
                    if (!scannedItems.some(item => item.b2 === payload.new.b2)) refreshData();
                } else {
                    refreshData();
                }
            }).subscribe();
        };

        async function refreshData() {
            const { data, error } = await _supabase.from('scans').select('*').order('id', { ascending: true });
            if (!error) {
                scannedItems = data;
                renderFullTable();
            }
        }

        async function processBarcode(code) {
            if (!tempBarcode1) {
                if (code.length !== 9) { playSound('error'); return; }
                tempBarcode1 = code;
                statusText.innerText = "WAITING FOR B2 (16-DIGIT)...";
                statusDot.className = "w-2.5 h-2.5 bg-blue-500 rounded-full animate-pulse";
            } else {
                if (code.length !== 16 || scannedItems.some(i => i.b2 === code)) { 
                    playSound('error'); 
                    statusText.innerText = "ERROR: B2 INVALID OR DUPLICATE";
                    statusDot.className = "w-2.5 h-2.5 bg-red-500 rounded-full";
                    tempBarcode1 = null;
                    return; 
                }
                
                playSound('success');
                const ts = `${new Date().getDate()}-${new Date().getMonth()+1}-${new Date().getFullYear()}, ${new Date().toLocaleTimeString('en-GB')}`;
                
                // 樂觀更新：先加到本機列表並顯示，不等雲端回傳
                const newItem = { b1: tempBarcode1, b2: code, time: ts, local: true };
                scannedItems.push(newItem);
                addSingleRowToUI(newItem, scannedItems.length);
                
                // 非同步上傳到雲端，不阻塞作業
                _supabase.from('scans').insert([{ b1: tempBarcode1, b2: code, time: ts }]).then(({error}) => {
                    if (error) console.error("Cloud Sync Error", error);
                });
                
                tempBarcode1 = null;
                statusText.innerText = "RECORDED LOCALLY & SYNCING...";
                statusDot.className = "w-2.5 h-2.5 bg-emerald-500 rounded-full";
            }
        }

        function addSingleRowToUI(item, index) {
            const row = document.createElement('tr');
            row.className = "hover:bg-zinc-50 transition-colors border-b";
            row.innerHTML = `
                <td rowspan="2" class="p-6 text-center font-bold text-zinc-200 text-4xl border-r">${index}</td>
                <td class="p-5 morandi-pink font-mono font-bold border-l-[10px] border-rose-200 text-sm shadow-inner">${item.b1}</td>
                <td class="p-2 bg-white text-center"><svg id="b1-v-${index}" class="barcode-svg" onclick="zoomBarcode('${item.b1}')"></svg></td>
                <td rowspan="2" class="p-5 text-right font-mono text-[9px] text-zinc-400">${item.time}</td>
                <td rowspan="2" class="p-5 text-center no-print">
                    <button onclick="deleteItemByB2('${item.b2}')" class="text-zinc-200 hover:text-red-500"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
                </td>
            `;
            const row2 = document.createElement('tr');
            row2.className = "hover:bg-zinc-50 transition-colors border-b";
            row2.innerHTML = `
                <td class="p-5 bg-zinc-50 font-mono font-bold text-sm border-l-[10px] border-zinc-100 shadow-inner">${item.b2}</td>
                <td class="p-2 bg-white text-center"><svg id="b2-v-${index}" class="barcode-svg" onclick="zoomBarcode('${item.b2}')"></svg></td>
            `;
            
            // 插入到最上方
            tableBody.prepend(row2);
            tableBody.prepend(row);
            
            // 局部繪製條碼
            const opts = { format: "CODE39", height: 100, width: 1.2, displayValue: false, margin: 10 };
            JsBarcode(`#b1-v-${index}`, item.b1, opts);
            JsBarcode(`#b2-v-${index}`, item.b2, opts);
            countValue.innerText = scannedItems.length;
        }

        function renderFullTable() {
            tableBody.innerHTML = '';
            [...scannedItems].reverse().forEach((item, index) => {
                const realIdx = scannedItems.length - index;
                const row = `
                    <tr class="border-b"><td rowspan="2" class="p-6 text-center font-bold text-zinc-200 text-4xl border-r">${realIdx}</td>
                    <td class="p-5 morandi-pink font-mono font-bold border-l-[10px] border-rose-200 text-sm">${item.b1}</td>
                    <td class="p-2 bg-white"><svg id="b1-f-${realIdx}" class="barcode-svg"></svg></td>
                    <td rowspan="2" class="p-5 text-right font-mono text-[9px] text-zinc-400">${item.time}</td>
                    <td rowspan="2" class="p-5 text-center no-print"><button onclick="deleteItemByB2('${item.b2}')" class="text-zinc-200 hover:text-red-500">❌</button></td></tr>
                    <tr class="border-b"><td class="p-5 bg-zinc-50 font-mono font-bold text-sm border-l-[10px] border-zinc-100">${item.b2}</td>
                    <td class="p-2 bg-white"><svg id="b2-f-${realIdx}" class="barcode-svg"></svg></td></tr>`;
                tableBody.insertAdjacentHTML('beforeend', row);
                JsBarcode(`#b1-f-${realIdx}`, item.b1, { format: "CODE39", height: 100, width: 1.2, displayValue: false });
                JsBarcode(`#b2-f-${realIdx}`, item.b2, { format: "CODE39", height: 100, width: 1.2, displayValue: false });
            });
            countValue.innerText = scannedItems.length;
        }

        async function deleteItemByB2(b2) {
            if(confirm('DELETE RECORD?')) {
                await _supabase.from('scans').delete().eq('b2', b2);
                scannedItems = scannedItems.filter(i => i.b2 !== b2);
                renderFullTable();
            }
        }

        async function exportToPDF() {
            if (scannedItems.length === 0) return;
            pdfBtn.disabled = true;
            pdfBtn.innerText = "處理中...";
            
            // 建立一個隱藏的列印用容器，避免直接在畫面上操作導致卡頓
            const printArea = document.createElement('div');
            printArea.style.width = '210mm';
            printArea.style.position = 'absolute';
            printArea.style.left = '-9999px';
            printArea.innerHTML = `<table style="width:100%; border-collapse:collapse; background:white;">
                <thead><tr style="background:#f9fafb; font-size:10px; text-align:center;">
                <th style="padding:10px; border:1px solid #eee;">No.</th>
                <th style="padding:10px; border:1px solid #eee;">Details</th>
                <th style="padding:10px; border:1px solid #eee;">Barcode</th>
                <th style="padding:10px; border:1px solid #eee;">Time</th></tr></thead>
                <tbody id="print-body"></tbody></table>`;
            document.body.appendChild(printArea);
            const pBody = printArea.querySelector('#print-body');

            scannedItems.forEach((item, index) => {
                const num = index + 1;
                const row = `
                    <tr><td rowspan="2" style="border:1px solid #eee; text-align:center; font-size:24px; color:#ccc; width:40px;">${num}</td>
                    <td style="background:#FFF1F2; padding:15px; font-weight:bold; border:1px solid #eee;">${item.b1}</td>
                    <td style="padding:5px; text-align:center; border:1px solid #eee;"><svg id="p-b1-${num}"></svg></td>
                    <td rowspan="2" style="padding:10px; text-align:right; font-size:9px; color:#999; border:1px solid #eee;">${item.time}</td></tr>
                    <tr><td style="padding:15px; font-weight:bold; border:1px solid #eee;">${item.b2}</td>
                    <td style="padding:5px; text-align:center; border:1px solid #eee;"><svg id="p-b2-${num}"></svg></td></tr>`;
                pBody.insertAdjacentHTML('beforeend', row);
                JsBarcode(`#p-b1-${num}`, item.b1, { format: "CODE39", height: 80, width: 1.2, displayValue: false });
                JsBarcode(`#p-b2-${num}`, item.b2, { format: "CODE39", height: 80, width: 1.2, displayValue: false });
            });

            // 給予一點時間讓 SVG 渲染
            setTimeout(async () => {
                const canvas = await html2canvas(printArea, { scale: 1.5, useCORS: true });
                const imgData = canvas.toDataURL('image/jpeg', 0.8);
                const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
                const pw = 210, ph = 297;
                const ih = (canvas.height * pw) / canvas.width;
                let hl = ih, pos = 0;

                pdf.addImage(imgData, 'JPEG', 0, pos, pw, ih);
                hl -= ph;
                while (hl > 0) {
                    pos = hl - ih;
                    pdf.addPage();
                    pdf.addImage(imgData, 'JPEG', 0, pos, pw, ih);
                    hl -= ph;
                }
                pdf.save(`HI-LIFE_${scannedItems.length}_ITEMS.pdf`);
                document.body.removeChild(printArea);
                pdfBtn.disabled = false;
                pdfBtn.innerText = "匯出 PDF";
            }, 800);
        }

        async function clearAll() {
            if(confirm('PERMANENTLY CLEAR ALL CLOUD DATA?')) {
                await _supabase.from('scans').delete().neq('id', 0);
                scannedItems = [];
                renderFullTable();
            }
        }

        inputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') { const v = inputEl.value.trim().toUpperCase(); if (v) processBarcode(v); inputEl.value = ''; } });
        document.addEventListener('click', () => { inputEl.focus(); });
    </script>
</body>
</html>
